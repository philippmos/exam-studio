# Child pipeline for the Python GraphQL API.
#
#   lint     ruff (lint + format) and mypy (strict) — a quality gate that must
#            pass before anything is built; plus an advisory dependency audit.
#   build    builds the API image and pushes it as :$CI_COMMIT_SHORT_SHA
#   test     runs the Playwright API tests against exactly that image:
#            PostgreSQL + the API run as job services, the API container
#            applies the alembic migrations on boot and the test suite's
#            global setup seeds the sample exam data.
#   release  re-tags the tested image as :latest (default branch only)

include:
  - local: ci/docker-build.gitlab-ci.yml
  - local: ci/e2e-services.gitlab-ci.yml

stages:
  - lint
  - build
  - test
  - release

default:
  interruptible: true

variables:
  API_IMAGE: $CI_REGISTRY_IMAGE/api

# --- Quality gate: shared uv setup for the lint stage -----------------------
.uv-quality:
  image: python:3.12-slim
  variables:
    UV_CACHE_DIR: .uv-cache
  cache:
    key:
      files:
        - api/uv.lock
    paths:
      - api/.uv-cache
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - pip install --no-cache-dir uv==0.11.17
    - cd api

api-lint:
  extends: .uv-quality
  stage: lint
  script:
    - uv sync --frozen
    - uv run ruff check app
    - uv run ruff format --check app
    - uv run mypy

api-audit:
  extends: .uv-quality
  stage: lint
  # Advisory: a new advisory should surface but not block the pipeline.
  allow_failure: true
  script:
    - uv export --frozen --no-dev --no-emit-project --format requirements-txt > audit-requirements.txt
    - uvx pip-audit --requirement audit-requirements.txt

docker-build:
  extends: .docker-build
  stage: build
  variables:
    IMAGE: $API_IMAGE
    BUILD_CONTEXT: api
  rules:
    - when: on_success

api-e2e:
  extends: .exam-stack
  stage: test
  image: node:22
  needs: [docker-build]
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    API_SERVICE_TAG: $CI_COMMIT_SHORT_SHA
  cache:
    key:
      files:
        - api/e2e/package-lock.json
    paths:
      - api/e2e/.npm
  script:
    - cd api/e2e
    - npm ci --cache .npm --prefer-offline
    - npx playwright test
  artifacts:
    when: always
    paths:
      - api/e2e/playwright-report/
    reports:
      junit: api/e2e/test-results/junit.xml
    expire_in: 1 week

docker-release:
  extends: .docker-release
  stage: release
  variables:
    IMAGE: $API_IMAGE
