# Parent pipeline: triggers a child pipeline per component when its files
# (or the shared ci/ templates) change.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

api:
  trigger:
    include:
      - local: api/.gitlab-api-ci.yml
    strategy: depend
  rules:
    - changes:
        - api/**/*
        - ci/**/*

client:
  trigger:
    include:
      - local: client/.gitlab-client-ci.yml
    strategy: depend
  needs:
    - job: api
      optional: true
  rules:
    - changes:
        - api/**/*
        - ci/**/*
      variables:
        API_SERVICE_TAG: $CI_COMMIT_SHORT_SHA
    - changes:
        - client/**/*
