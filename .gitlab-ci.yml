# Parent pipeline: triggers a child pipeline per component when its files
# (or the shared ci/ templates) change.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

api:
  trigger:
    include:
      - local: api/.gitlab-api-ci.yml
    strategy: depend
  rules:
    - changes:
        - api/**/*
        - ci/**/*

client:
  trigger:
    include:
      - local: client/.gitlab-client-ci.yml
    strategy: depend
  # The client E2E tests run against the api:latest image, which the api
  # pipeline releases only after its own tests pass — so when both pipelines
  # run, let the api child finish first.
  needs:
    - job: api
      optional: true
  rules:
    - changes:
        - client/**/*
        - ci/**/*
