# Shared templates for the container image lifecycle: build once, promote
# after verification.
#
#   .docker-build    builds the image and pushes it under the immutable
#                    commit tag (:$CI_COMMIT_SHORT_SHA).
#   .docker-release  re-tags an already *tested* commit image as :latest.
#                    Runs on the default branch only, after the test stage,
#                    so :latest always points to a verified image.
#
# Extending jobs set IMAGE (registry path) and, for builds, BUILD_CONTEXT.

.docker-base:
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

.docker-build:
  extends: .docker-base
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - docker pull "$IMAGE:latest" || true
    - docker build
        --pull
        --cache-from "$IMAGE:latest"
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t "$IMAGE:$CI_COMMIT_SHORT_SHA"
        "$BUILD_CONTEXT"
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"

.docker-release:
  extends: .docker-base
  script:
    - docker pull "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker tag "$IMAGE:$CI_COMMIT_SHORT_SHA" "$IMAGE:latest"
    - docker push "$IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
