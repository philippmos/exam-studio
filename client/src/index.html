<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Exam Studio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!--
      Apply the saved dark/light choice before first paint so the page never
      flashes the wrong mode. Mirrors ThemeService (key: exam-studio.theme).
    -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('exam-studio.theme');
          document.documentElement.style.colorScheme =
            pref === 'LIGHT' ? 'light' : pref === 'DARK' ? 'dark' : 'light dark';
        } catch (e) {
          /* localStorage unavailable — fall back to the CSS default. */
        }
      })();
    </script>
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
