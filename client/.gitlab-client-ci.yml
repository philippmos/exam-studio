# Child pipeline for the Angular client.
#
#   build    compiles the production bundle (kept as artifact) and builds/
#            pushes the client image as :$CI_COMMIT_SHORT_SHA
#   test     Playwright E2E: serves the production bundle from the build
#            artifact (e2e/server.mjs, which proxies /graphql like nginx
#            does in the shipped image) against a real API + PostgreSQL
#            running as job services, and drives it with Chromium.
#   release  re-tags the tested image as :latest (default branch only)

include:
  - local: ci/docker-build.gitlab-ci.yml
  - local: ci/e2e-services.gitlab-ci.yml

stages:
  - build
  - test
  - release

default:
  interruptible: true

variables:
  CLIENT_IMAGE: $CI_REGISTRY_IMAGE/client
  API_IMAGE: $CI_REGISTRY_IMAGE/api
  API_SERVICE_TAG: latest

build:
  stage: build
  image: node:20-alpine
  cache:
    key:
      files:
        - client/package-lock.json
    paths:
      - client/.npm
  script:
    - cd client
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - client/dist/
    expire_in: 1 week

docker-build:
  extends: .docker-build
  stage: build
  variables:
    IMAGE: $CLIENT_IMAGE
    BUILD_CONTEXT: client

client-e2e:
  extends: .exam-stack
  stage: test
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  needs: [build]
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key:
      files:
        - client/e2e/package-lock.json
    paths:
      - client/e2e/.npm
  script:
    - cd client/e2e
    - npm ci --cache .npm --prefer-offline
    - npx playwright test
  artifacts:
    when: always
    paths:
      - client/e2e/playwright-report/
    reports:
      junit: client/e2e/test-results/junit.xml
    expire_in: 1 week

docker-release:
  extends: .docker-release
  stage: release
  variables:
    IMAGE: $CLIENT_IMAGE
